services:
  postgres:
    image: postgres:16-alpine
    container_name: kvadroklimat-db
    environment:
      POSTGRES_DB: kvadroklimat
      POSTGRES_USER: kvadroklimat
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kvadroklimat-api
    environment:
      DATABASE_URL: postgresql://kvadroklimat:${DB_PASSWORD:-secret123}@postgres:5432/kvadroklimat
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kvadroklimat-web
    environment:
      NEXT_PUBLIC_API_URL: https://api.kvadroklimat.ru
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: kvadroklimat-nginx
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
